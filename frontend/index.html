<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>MindfulAI — AI Powered Mindfulness & Emotional Wellness</title>
    <meta name="description" content="MindfulAI uses computer vision to detect your emotion in real time and recommends personalised mindfulness activities. Privacy first. Free to start." />
    <meta name="keywords" content="mindfulness, AI, emotion detection, mental health, meditation, anxiety relief, stress management, wellbeing" />
    <meta name="author" content="Wisdom Marore" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://mindfulai.app" />

    <!-- Open Graph — for sharing on WhatsApp, Facebook, LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mindfulai.app" />
    <meta property="og:title" content="MindfulAI — Unlock inner calm. Live life fully." />
    <meta property="og:description" content="AI powered mindfulness app that detects your emotion and recommends personalised activities. Privacy first — no images ever stored." />
    <meta property="og:image" content="/meditation-stones.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MindfulAI — Unlock inner calm. Live life fully." />
    <meta name="twitter:description" content="AI powered mindfulness app that detects your emotion and recommends personalised activities." />
    <meta name="twitter:image" content="/meditation-stones.jpg" />

    <!-- Theme color — matches our dark blue navbar -->
    <meta name="theme-color" content="#1e3a8a" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/mindfulai-logo.svg" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
   <!-- Structured Data — helps Google understand the app -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "MindfulAI",
      "description": "AI powered mindfulness app that uses computer vision to detect emotions and recommend personalised mindfulness activities.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Wisdom Marore",
        "affiliation": "University of Zimbabwe"
      }
    }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
