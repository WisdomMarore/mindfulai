<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- Vibrant gradient for lens rings -->
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C9FF"/>
      <stop offset="50%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>

    <!-- Teal/aqua gradient for inner iris -->
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00FFC8;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#00A3FF;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0.4"/>
    </radialGradient>

    <!-- Pupil glow -->
    <radialGradient id="pupilGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#00FFC8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0"/>
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C9FF"/>
      <stop offset="50%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft drop shadow -->
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="circleClip">
      <circle cx="80" cy="80" r="58"/>
    </clipPath>
  </defs>

  <!-- Background: dark -->
  <rect width="480" height="160" rx="16" fill="#0A0A14"/>

  <!-- === ICON: Lens / Eye === -->

  <!-- Outer ring glow -->
  <circle cx="80" cy="80" r="62" fill="none" stroke="url(#lensGrad)" stroke-width="1.5" opacity="0.3" filter="url(#softGlow)"/>

  <!-- Outer lens ring -->
  <circle cx="80" cy="80" r="58" fill="none" stroke="url(#lensGrad)" stroke-width="3" filter="url(#glow)"/>

  <!-- Camera aperture blades (subtle, geometric) -->
  <g opacity="0.18" clip-path="url(#circleClip)">
    <line x1="80" y1="22" x2="80" y2="138" stroke="#00C9FF" stroke-width="1"/>
    <line x1="22" y1="80" x2="138" y2="80" stroke="#6C63FF" stroke-width="1"/>
    <line x1="38" y1="38" x2="122" y2="122" stroke="#FF6B9D" stroke-width="1"/>
    <line x1="122" y1="38" x2="38" y2="122" stroke="#00FFC8" stroke-width="1"/>
  </g>

  <!-- Mid ring -->
  <circle cx="80" cy="80" r="42" fill="none" stroke="url(#lensGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Iris fill -->
  <circle cx="80" cy="80" r="38" fill="url(#irisGrad)" opacity="0.85"/>

  <!-- Inner ring -->
  <circle cx="80" cy="80" r="28" fill="none" stroke="#00FFC8" stroke-width="1.2" opacity="0.6"/>

  <!-- Pupil -->
  <circle cx="80" cy="80" r="18" fill="#0A0A14"/>
  <circle cx="80" cy="80" r="16" fill="url(#pupilGrad)" filter="url(#glow)"/>

  <!-- Specular highlight -->
  <circle cx="73" cy="73" r="5" fill="white" opacity="0.6"/>
  <circle cx="71" cy="71" r="2" fill="white" opacity="0.9"/>

  <!-- Scan line accent -->
  <line x1="22" y1="80" x2="138" y2="80" stroke="url(#lensGrad)" stroke-width="0.8" opacity="0.25" clip-path="url(#circleClip)"/>

  <!-- === WORDMARK === -->

  <!-- "Inner" -->
  <text
    x="158"
    y="72"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="38"
    font-weight="400"
    font-style="italic"
    letter-spacing="-0.5"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >Inner</text>

  <!-- "Lens" - bolder, upright -->
  <text
    x="158"
    y="112"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    letter-spacing="6"
    fill="#ffffff"
  >LENS</text>

  <!-- Tagline -->
  <text
    x="160"
    y="133"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="10"
    letter-spacing="3.5"
    fill="#6C63FF"
    opacity="0.85"
  >MINDFUL · VISION · AI</text>

  <!-- Thin accent line between Inner and Lens -->
  <line x1="158" y1="80" x2="360" y2="80" stroke="url(#lensGrad)" stroke-width="0.8" opacity="0.4"/>

</svg>
