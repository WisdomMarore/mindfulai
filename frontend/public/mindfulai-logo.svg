<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" width="220" height="44">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#93C5FD"/>
    </linearGradient>
  </defs>

  <!-- Icon: stylised person meditating in a circle -->
  <!-- Outer circle -->
  <circle cx="22" cy="22" r="19" fill="none" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.6"/>

  <!-- Head -->
  <circle cx="22" cy="11" r="4" fill="url(#iconGrad)"/>

  <!-- Body / lotus pose -->
  <!-- Left arm -->
  <path d="M22 16 Q13 20 12 26" stroke="url(#iconGrad)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M22 16 Q31 20 32 26" stroke="url(#iconGrad)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Torso -->
  <line x1="22" y1="15" x2="22" y2="24" stroke="url(#iconGrad)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left leg -->
  <path d="M22 24 Q17 28 14 30" stroke="url(#iconGrad)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Right leg -->
  <path d="M22 24 Q27 28 30 30" stroke="url(#iconGrad)" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Small glow dots around head suggesting mindfulness/aura -->
  <circle cx="22" cy="5" r="1.2" fill="url(#dotGrad)" opacity="0.7"/>
  <circle cx="28" cy="7" r="0.9" fill="url(#dotGrad)" opacity="0.5"/>
  <circle cx="16" cy="7" r="0.9" fill="url(#dotGrad)" opacity="0.5"/>

  <!-- Wordmark: MindfulAI -->
  <!-- "Mindful" in white semi-bold -->
  <text
    x="50"
    y="26"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="18"
    font-weight="600"
    letter-spacing="0.3"
    fill="#ffffff"
  >Mindful</text>

  <!-- "AI" in light blue to contrast -->
  <text
    x="136"
    y="26"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="0.5"
    fill="#93C5FD"
  >AI</text>

  <!-- Thin underline accent -->
  <line x1="50" y1="31" x2="160" y2="31" stroke="#93C5FD" stroke-width="0.8" opacity="0.35"/>

  <!-- Tagline -->
  <text
    x="50"
    y="40"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="7"
    letter-spacing="2"
    fill="#93C5FD"
    opacity="0.7"
  >MINDFUL · VISION · AI</text>

</svg>
